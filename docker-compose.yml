version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: autox_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autox
    ports:
      - '5432:5432'
    volumes:
      - autox_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: autox_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - autox_redis_data:/data

volumes:
  autox_pg_data:
  autox_redis_data:
